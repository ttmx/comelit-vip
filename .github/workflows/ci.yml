name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Reject tracked credentials and captures
        run: |
          tracked="$(git ls-files -- '*.har' '[0-9]*.tar.gz' 'secrets*.json' |
            grep -v '^secrets.example.json$' || true)"
          test -z "$tracked"
      - run: uv lock --check
      - run: uv sync --locked
      - run: uv run python -m unittest discover -s tests -v
      - run: uv build
